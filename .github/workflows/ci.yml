name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-client:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:client

  build-gateway:
    name: Build Gateway Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway/Dockerfile
          push: false
          tags: kafka-chat/gateway:ci

  build-message-service:
    name: Build Message Service Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/message-service/Dockerfile
          push: false
          tags: kafka-chat/message-service:ci

  build-dlq-worker:
    name: Build DLQ Worker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/dlq-worker/Dockerfile
          push: false
          tags: kafka-chat/dlq-worker:ci

  health-check:
    name: Integration Health Check
    runs-on: ubuntu-latest
    needs: [build-gateway, build-message-service]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ready > /dev/null 2>&1; then
              echo "Gateway ready"
              exit 0
            fi
            sleep 5
          done
          echo "Gateway failed to become ready"
          exit 1
      - name: Check gateway health
        run: curl -sf http://localhost:8080/health | jq .
      - name: Cleanup
        if: always()
        run: docker compose down -v

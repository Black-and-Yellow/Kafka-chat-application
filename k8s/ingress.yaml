apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka-chat-ingress
  namespace: kafka-chat
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "gateway"
spec:
  ingressClassName: nginx
  rules:
    - host: chat.example.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /crypto
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /dev
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /messages
            pathType: Prefix
            backend:
              service:
                name: message-service
                port:
                  number: 8090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: kafka-chat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

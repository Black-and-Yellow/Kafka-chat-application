apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: kafka-chat
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: kafka-chat/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kafka-chat-config
            - secretRef:
                name: kafka-chat-secrets
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: KAFKA_CLIENT_ID
              value: "gateway"
            - name: GATEWAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: kafka-chat
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: kafka-chat
  labels:
    app: message-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: kafka-chat/message-service:latest
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: kafka-chat-config
            - secretRef:
                name: kafka-chat-secrets
          env:
            - name: MESSAGE_SERVICE_PORT
              value: "8090"
            - name: KAFKA_CLIENT_ID
              value: "message-service"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 25
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: kafka-chat
spec:
  selector:
    app: message-service
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-worker
  namespace: kafka-chat
  labels:
    app: dlq-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-worker
  template:
    metadata:
      labels:
        app: dlq-worker
    spec:
      containers:
        - name: dlq-worker
          image: kafka-chat/dlq-worker:latest
          ports:
            - containerPort: 8095
          envFrom:
            - configMapRef:
                name: kafka-chat-config
            - secretRef:
                name: kafka-chat-secrets
          env:
            - name: DLQ_WORKER_PORT
              value: "8095"
            - name: KAFKA_CLIENT_ID
              value: "dlq-worker"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8095
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
